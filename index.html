<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🌍 Terra Link — кругообіг оболонок</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #1a3a2c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            touch-action: pan-y; 
        }
        .game-wrapper {
            background: #e3d6b5;
            border-radius: 48px 48px 36px 36px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.4), inset 0 2px 8px #fbf3df;
            padding: 18px 18px 30px;
            max-width: 550px;
            width: 96%;
            margin: 16px auto;
            border: 3px solid #8b7a5a;
        }
        h1 {
            text-align: center;
            font-weight: 700;
            font-size: 2.2rem;
            color: #1f4f2b;
            text-shadow: 3px 3px 0 #b9aa83;
            margin: 0 0 6px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        h1 span {
            background: #2f6b3a;
            color: #fef7e7;
            font-size: 1.2rem;
            padding: 5px 18px;
            border-radius: 40px;
            box-shadow: inset 0 1px 4px #c2b08b, 0 4px 0 #1b3a1b;
        }
        canvas {
            display: block;
            margin: 0 auto;
            width: 100%;
            height: auto;
            aspect-ratio: 1/1;
            background: #aac0a2;
            border-radius: 36px;
            box-shadow: inset 0 0 0 5px #736b4b, inset 0 8px 12px rgba(0,0,0,0.08), 0 10px 0 #4d5e3f;
            border: 2px solid #efdfbe;
            touch-action: none;
            cursor: crosshair;
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 6px 12px;
            background: #cdbc95;
            padding: 12px 18px;
            border-radius: 50px;
            box-shadow: inset 0 2px 6px #9e8e6c, 0 6px 0 #6b5b3e;
            color: #1d351d;
            font-weight: bold;
        }
        .level-box, .links-box {
            background: #f3ebd2;
            padding: 6px 20px;
            border-radius: 40px;
            box-shadow: inset 0 1px 5px #9b8a66, 0 3px 0 #5a4d34;
            font-size: 1.3rem;
            display: flex;
            align-items: baseline;
            gap: 6px;
        }
        .value {
            font-size: 2rem;
            font-weight: 800;
            color: #1d5c1d;
            line-height: 1;
        }
        button {
            background: #5c8a56;
            border: none;
            color: #fdf6e3;
            font-weight: bold;
            font-size: 1.4rem;
            padding: 10px 28px;
            border-radius: 60px;
            box-shadow: 0 6px 0 #2a4f2a, 0 2px 8px rgba(0,0,0,0.2);
            transition: all 0.06s;
            border: 2px solid #ebdaaf;
            cursor: pointer;
            touch-action: manipulation;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #2a4f2a, 0 2px 6px rgba(0,0,0,0.2);
        }
        .goal-area {
            background: #dbceaa;
            border-radius: 30px;
            padding: 14px 18px;
            margin-top: 14px;
            box-shadow: inset 0 2px 5px #a3926f, 0 4px 0 #746442;
            font-weight: 600;
            color: #1e3d1e;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .goal-text {
            background: #fbf2da;
            padding: 5px 20px;
            border-radius: 30px;
            box-shadow: inset 0 1px 3px #7f6e4e;
        }
        .legend {
            display: flex;
            justify-content: space-around;
            margin: 12px 4px 0;
            color: #2d4522;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .legend span::before {
            content: "●";
            margin-right: 6px;
            font-size: 1.5rem;
            vertical-align: middle;
        }
        .footer-note {
            color: #49633e;
            text-align: center;
            margin-top: 12px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <h1>🌐 TERRA LINK <span>кругообіг</span></h1>
    <canvas id="terraCanvas" width="600" height="600"></canvas>
    
    <div class="info-panel">
        <div class="level-box">
            <span>🌱 рівень</span>
            <span class="value" id="levelDisplay">1</span>
        </div>
        <button id="resetBtn">↻ заново</button>
        <div class="links-box">
            <span>🔗 ланки</span>
            <span class="value" id="linksCount">0/3</span>
        </div>
    </div>

    <div class="goal-area">
        <span>🎯 завдання:</span>
        <span class="goal-text" id="goalDescription">💧 → 🌬️ (випаровування)</span>
    </div>

    <div class="legend">
        <span style="color:#6b4f32;">🗿 літосфера</span>
        <span style="color:#1f7a8c;">💧 гідросфера</span>
        <span style="color:#b0c4de;">🌬️ атмосфера</span>
        <span style="color:#2e6b2e;">🌿 біосфера</span>
    </div>
    <div class="footer-note">
        👆 проведи від однієї кулі до іншої — створи зв'язок
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ----- НАЛАШТУВАННЯ -----
        const canvas = document.getElementById('terraCanvas');
        const ctx = canvas.getContext('2d');
        
        const levelSpan = document.getElementById('levelDisplay');
        const linksSpan = document.getElementById('linksCount');
        const goalDesc = document.getElementById('goalDescription');
        const resetBtn = document.getElementById('resetBtn');

        // ----- ОБОЛОНКИ (точки зв'язку) -----
        const spheres = [
            { label: 'litho', name: 'Літосфера', emoji: '🗿', x: 200, y: 240, r: 38, color: '#6b4f32', light: '#9c7e5a' },
            { label: 'hydro', name: 'Гідросфера', emoji: '💧', x: 400, y: 200, r: 36, color: '#1f7a8c', light: '#5faab5' },
            { label: 'atmo',  name: 'Атмосфера',  emoji: '🌬️', x: 300, y: 420, r: 42, color: '#b0c4de', light: '#d7e3f5' },
            { label: 'bio',   name: 'Біосфера',  emoji: '🌿', x: 140, y: 400, r: 32, color: '#2e6b2e', light: '#5f9d5f' }
        ];

        // Індекси для зручності
        const LITHO = 0, HYDRO = 1, ATMO = 2, BIO = 3;

        // ----- МОЖЛИВІ ЗВ'ЯЗКИ (правила кругообігу) -----
        // кожен зв'язок: [від, до, опис]
        const validConnections = [
            { from: HYDRO, to: ATMO, desc: '💧→🌬️ випаровування' },
            { from: ATMO, to: HYDRO, desc: '🌬️→💧 опади (дощ)' },
            { from: ATMO, to: LITHO, desc: '🌬️→🗿 вивітрювання' },
            { from: LITHO, to: BIO,   desc: '🗿→🌿 ґрунт для рослин' },
            { from: BIO,   to: ATMO,  desc: '🌿→🌬️ фотосинтез (кисень)' },
            { from: HYDRO, to: BIO,   desc: '💧→🌿 вода для рослин' },
            { from: BIO,   to: HYDRO, desc: '🌿→💧 транспірація' },
            { from: LITHO, to: HYDRO, desc: '🗿→💧 мінерали у воду' }
        ];

        // ----- СТАН ГРИ -----
        let currentLevel = 1;
        let requiredLinks = 3;          // скільки зв'язків потрібно для рівня
        let completedLinks = 0;          // зроблено правильних зв'язків
        let gameLocked = false;          // блокування після завершення рівня
        
        // Поточне завдання (один з validConnections)
        let currentTask = null;
        
        // Для відстеження свайпу
        let swipeStartSphere = null;      // індекс сфери, з якої почали
        let isSwiping = false;
        let swipePath = [];               // точки для малювання лінії

        // ----- ДОПОМІЖНІ ФУНКЦІЇ -----
        function getSphereIndexFromCoord(px, py) {
            for (let i=0; i<spheres.length; i++) {
                const s = spheres[i];
                const dx = px - s.x;
                const dy = py - s.y;
                const dist = Math.hypot(dx, dy);
                if (dist <= s.r + 20) {  // трохи більша зона захвату
                    return i;
                }
            }
            return -1;
        }

        // Вибрати випадкове завдання, яке ще не виконане? (у нас проста логіка — одне завдання на рівень)
        function pickRandomTask() {
            const randomIndex = Math.floor(Math.random() * validConnections.length);
            return { ...validConnections[randomIndex] };
        }

        // Оновити відображення завдання
        function updateTaskDisplay() {
            if (currentTask) {
                goalDesc.textContent = currentTask.desc;
            } else {
                goalDesc.textContent = '✨ обери зв’язок';
            }
        }

        // Перевірка, чи виконано поточне завдання
        function isTaskCompleted(connection) {
            if (!currentTask) return false;
            return (connection.from === currentTask.from && connection.to === currentTask.to);
        }

        // Перехід на наступний рівень
        function advanceLevel() {
            currentLevel++;
            requiredLinks = Math.min(8, 3 + Math.floor(currentLevel / 2)); // зростає складність
            completedLinks = 0;
            gameLocked = false;
            currentTask = pickRandomTask();
            updateTaskDisplay();
            updateUI();
        }

        // Скидання прогресу рівня (якщо гравець хоче заново)
        function resetLevel() {
            completedLinks = 0;
            gameLocked = false;
            // можна змінити завдання на нове
            currentTask = pickRandomTask();
            updateTaskDisplay();
            updateUI();
        }

        // Оновлення тексту UI
        function updateUI() {
            levelSpan.textContent = currentLevel;
            linksSpan.textContent = `${completedLinks}/${requiredLinks}`;
        }

        // Завершення рівня (коли досягнуто requiredLinks)
        function finishLevel() {
            gameLocked = true;
            // показуємо повідомлення
            drawScene(); // оновимо canvas
            setTimeout(() => {
                if (gameLocked) {
                    advanceLevel();
                    drawScene();
                }
            }, 700);
        }

        // Спроба додати зв'язок
        function attemptConnection(fromIdx, toIdx) {
            if (gameLocked) return false;
            if (fromIdx === toIdx) return false;
            
            // Перевіряємо, чи є такий зв'язок серед validConnections
            const conn = validConnections.find(c => c.from === fromIdx && c.to === toIdx);
            if (!conn) {
                // Неправильний зв'язок — можна показати підказку (але без штрафу)
                return false;
            }
            
            // Перевіряємо, чи це поточне завдання
            if (!isTaskCompleted(conn)) {
                // Можна дати зворотний зв'язок: "не те завдання"
                return false;
            }
            
            // Правильний зв'язок!
            completedLinks++;
            updateUI();
            
            // Візуальний ефект: збережемо останній успішний зв'язок для малювання
            lastSuccessConnection = { from: fromIdx, to: toIdx };
            
            if (completedLinks >= requiredLinks) {
                finishLevel();
            } else {
                // Видаємо нове завдання (наступний крок кругообігу)
                currentTask = pickRandomTask();
                updateTaskDisplay();
            }
            drawScene();
            return true;
        }

        // ----- МАЛЮВАННЯ -----
        let lastSuccessConnection = null; // для підсвічування
        
        function drawScene() {
            ctx.clearRect(0, 0, 600, 600);
            
            // Фон "старий папір"
            ctx.fillStyle = '#aac0a2';
            ctx.fillRect(0, 0, 600, 600);
            // текстура
            ctx.fillStyle = '#8da384';
            for(let i=0; i<30; i++) {
                ctx.beginPath();
                ctx.arc(30+(i*23)%580, 40+(i*31)%560, 1.5, 0, 2*Math.PI);
                ctx.fill();
            }
            
            // Схематичне ядро Землі
            ctx.beginPath();
            ctx.arc(300, 300, 70, 0, 2*Math.PI);
            const grad = ctx.createRadialGradient(270, 270, 15, 300, 300, 70);
            grad.addColorStop(0, '#b35e2e');
            grad.addColorStop(1, '#6d371a');
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.shadowColor = '#4a2e1a';
            ctx.shadowBlur = 14;
            ctx.strokeStyle = '#eadbba';
            ctx.lineWidth = 6;
            ctx.stroke();
            ctx.shadowBlur = 0;
            
            // Підписи "Земля"
            ctx.font = 'bold 16px "Segoe UI", sans-serif';
            ctx.fillStyle = '#f9efd3';
            ctx.shadowColor = '#1f2e0e';
            ctx.shadowBlur = 8;
            ctx.fillText('🌍 ЯДРО', 250, 310);
            ctx.shadowBlur = 0;
            
            // Малюємо зв'язки (лінії) між сферами, які вже "відкриті"? 
            // Ми не зберігаємо історію, але можемо показати останній успішний зв'язок.
            if (lastSuccessConnection) {
                const fromS = spheres[lastSuccessConnection.from];
                const toS = spheres[lastSuccessConnection.to];
                ctx.beginPath();
                ctx.moveTo(fromS.x, fromS.y);
                ctx.lineTo(toS.x, toS.y);
                ctx.strokeStyle = '#f5e56b';
                ctx.lineWidth = 7;
                ctx.shadowBlur = 16;
                ctx.shadowColor = '#ffd966';
                ctx.setLineDash([8, 8]);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.shadowBlur = 0;
            }
            
            // Малюємо лінію свайпу (якщо активний)
            if (isSwiping && swipePath.length > 1) {
                ctx.beginPath();
                ctx.moveTo(swipePath[0].x, swipePath[0].y);
                for (let i=1; i<swipePath.length; i++) {
                    ctx.lineTo(swipePath[i].x, swipePath[i].y);
                }
                ctx.strokeStyle = '#f2e09f';
                ctx.lineWidth = 8;
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#c9a84b';
                ctx.setLineDash([10, 6]);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.shadowBlur = 0;
            }
            
            // Малюємо сфери оболонок
            spheres.forEach((s, idx) => {
                // тінь
                ctx.shadowColor = '#3a2e1e';
                ctx.shadowBlur = 10;
                ctx.shadowOffsetY = 3;
                
                const grad = ctx.createRadialGradient(s.x-10, s.y-10, 6, s.x, s.y, s.r+6);
                grad.addColorStop(0, s.light);
                grad.addColorStop(1, s.color);
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, 2*Math.PI);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.shadowBlur = 6;
                ctx.strokeStyle = '#efe0c6';
                ctx.lineWidth = 5;
                ctx.stroke();
                
                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;
                // емодзі
                ctx.font = `bold ${s.r * 0.8}px 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji'`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#1f2a16';
                ctx.fillText(s.emoji, s.x, s.y-6);
                // назва
                ctx.font = '500 13px "Segoe UI", sans-serif';
                ctx.fillStyle = '#1e331c';
                ctx.fillText(s.name, s.x, s.y + s.r-8);
            });
            
            // Підказка, якщо рівень завершено
            if (gameLocked) {
                ctx.font = 'bold 24px "Segoe UI", sans-serif';
                ctx.fillStyle = '#2d5120';
                ctx.shadowColor = '#eadbba';
                ctx.shadowBlur = 12;
                ctx.fillText('🌟 РІВЕНЬ ПРОЙДЕНО!', 150, 140);
                ctx.shadowBlur = 0;
            }
        }

        // ----- ОБРОБКА СВАЙПІВ (touch + mouse) -----
        function handleStart(e) {
            e.preventDefault();
            if (gameLocked) return;
            
            const coord = getCanvasCoord(e);
            if (!coord) return;
            const idx = getSphereIndexFromCoord(coord.x, coord.y);
            if (idx !== -1) {
                swipeStartSphere = idx;
                isSwiping = true;
                swipePath = [{ x: coord.x, y: coord.y }];
                drawScene();
            }
        }

        function handleMove(e) {
            e.preventDefault();
            if (!isSwiping || gameLocked) return;
            
            const coord = getCanvasCoord(e);
            if (!coord) return;
            
            // Додаємо точку до шляху (обмежимо кількість для плавності)
            swipePath.push({ x: coord.x, y: coord.y });
            if (swipePath.length > 20) swipePath.shift();
            
            drawScene();
        }

        function handleEnd(e) {
            e.preventDefault();
            if (!isSwiping || gameLocked) {
                isSwiping = false;
                swipePath = [];
                drawScene();
                return;
            }
            
            const coord = getCanvasCoord(e);
            if (coord) {
                const endIdx = getSphereIndexFromCoord(coord.x, coord.y);
                if (swipeStartSphere !== null && endIdx !== -1 && swipeStartSphere !== endIdx) {
                    attemptConnection(swipeStartSphere, endIdx);
                }
            }
            
            // Скидаємо свайп
            isSwiping = false;
            swipePath = [];
            swipeStartSphere = null;
            drawScene();
        }

        // Отримання координат відносно canvas
        function getCanvasCoord(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX, clientY;
            if (e.touches) {
                if (e.touches.length === 0) return null;
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        // ----- ІНІЦІАЛІЗАЦІЯ ПОДІЙ -----
        function bindEvents() {
            canvas.addEventListener('touchstart', handleStart, { passive: false });
            canvas.addEventListener('touchmove', handleMove, { passive: false });
            canvas.addEventListener('touchend', handleEnd, { passive: false });
            canvas.addEventListener('touchcancel', handleEnd, { passive: false });
            
            canvas.addEventListener('mousedown', handleStart);
            canvas.addEventListener('mousemove', handleMove);
            canvas.addEventListener('mouseup', handleEnd);
            canvas.addEventListener('mouseleave', handleEnd);
            
            canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        }

        // ----- СКИДАННЯ / НОВА ГРА -----
        function fullReset() {
            currentLevel = 1;
            requiredLinks = 3;
            completedLinks = 0;
            gameLocked = false;
            currentTask = pickRandomTask();
            lastSuccessConnection = null;
            updateTaskDisplay();
            updateUI();
            drawScene();
        }

        // ----- СТАРТ -----
        function init() {
            bindEvents();
            fullReset();
            resetBtn.addEventListener('click', () => {
                fullReset();
            });
        }

        init();
    })();
</script>
</body>
</html>
